apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: app-ci-tasks
spec:
  workspaces:
    - name: source
  steps:
    # TASK 5: Test Task menggunakan Nose/Pytest
    - name: run-nose-tests
      image: python:3.10-alpine
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env sh
        echo "Installing required testing tools..."
        pip install --no-cache-dir nose pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        echo "Executing unit tests..."
        nosetests # atau pytest sesuai framework yang dipakai

    # TASK 4: Cleanup Task
    - name: cleanup-workspace
      image: alpine:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env sh
        echo "Cleaning up Python cache files..."
        find . -type d -name  "__pycache__" -exec rm -r {} +
        rm -rf .pytest_cache
